name: Sync upstream

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge upstream main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/openai/plugins.git || true
          git fetch upstream main
          # Use -X ours: when conflicts occur, prefer our fork's version
          # so local customizations (name, displayName, plugin list) are preserved
          if git merge --no-edit -X ours upstream/main; then
            echo "Merge successful, pushing changes"
          else
            echo "Merge conflict detected, keeping local fork version"
            git merge --abort || true
          fi
          git push origin HEAD:main
